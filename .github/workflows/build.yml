name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner label. Chromium Android builds usually need a large self-hosted runner.
        required: true
        type: string
        default: self-hosted
      publish_release:
        description: Publish build outputs to a GitHub Release.
        required: true
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'self-hosted' }}
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: recursive
          fetch-depth: 1

      - name: Validate signing secrets
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}
        run: |
          test -n "$LOCAL_TEST_JKS"
          test -n "$STORE_TEST_JKS"

      - name: Prepare
        run: |
          chmod +x *.sh
          version="$(grep -m1 -o '[0-9]\+\(\.[0-9]\+\)\{3\}' vanadium/args.gn)"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "BUILD_SUFFIX=${version}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Build
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}
        run: |
          ./build.sh

      - name: Collect outputs
        run: |
          mkdir -p artifacts
          cp "chromium/src/out/release/${VERSION}-armeabi-v7a.apk" "artifacts/${BUILD_SUFFIX}-armeabi-v7a.apk"
          cp "chromium/src/out/release/${VERSION}-arm64-v8a.apk" "artifacts/${BUILD_SUFFIX}-arm64-v8a.apk"
          cp "chromium/src/out/release/${VERSION}-arm64-v8a.aab" "artifacts/${BUILD_SUFFIX}-arm64-v8a.aab"
          sha256sum artifacts/* > "artifacts/${BUILD_SUFFIX}-SHA256SUMS.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helium-android-${{ env.BUILD_SUFFIX }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release) }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', env.VERSION) }}
          name: Helium Android ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/*
