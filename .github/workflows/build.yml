name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      runner:
        description: Runner label. Chromium Android builds usually need a large self-hosted runner.
        required: true
        type: choice
        default: ubuntu-latest
        options:
          - ubuntu-latest
          - self-hosted
      publish_release:
        description: Publish build outputs to a GitHub Release.
        required: true
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          submodules: recursive
          fetch-depth: 1

      - name: Prepare signing config
        id: signing
        env:
          LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
          STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}
        run: |
          if [ -n "$LOCAL_TEST_JKS" ] && [ -n "$STORE_TEST_JKS" ]; then
            echo "LOCAL_TEST_JKS=$LOCAL_TEST_JKS" >> "$GITHUB_ENV"
            echo "STORE_TEST_JKS=$STORE_TEST_JKS" >> "$GITHUB_ENV"
            echo "source=secrets" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! command -v keytool >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y openjdk-17-jre-headless
          fi

          mkdir -p ci-signing
          printf '%s\n' \
            'keyAlias=helium-ci' \
            'keyPassword=android' \
            'storePassword=android' \
            > ci-signing/local.properties

          keytool -genkeypair \
            -keystore ci-signing/test.jks \
            -storepass android \
            -keypass android \
            -alias helium-ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Helium CI,O=Helium,C=US"

          echo "LOCAL_TEST_JKS=$(base64 -w0 ci-signing/local.properties)" >> "$GITHUB_ENV"
          echo "STORE_TEST_JKS=$(base64 -w0 ci-signing/test.jks)" >> "$GITHUB_ENV"
          echo "source=generated" >> "$GITHUB_OUTPUT"

      - name: Prepare
        run: |
          chmod +x *.sh
          version="$(grep -m1 -o '[0-9]\+\(\.[0-9]\+\)\{3\}' vanadium/args.gn)"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "BUILD_SUFFIX=${version}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Build
        run: |
          ./build.sh

      - name: Collect outputs
        run: |
          mkdir -p artifacts
          cp "chromium/src/out/release/${VERSION}-armeabi-v7a.apk" "artifacts/${BUILD_SUFFIX}-armeabi-v7a.apk"
          cp "chromium/src/out/release/${VERSION}-arm64-v8a.apk" "artifacts/${BUILD_SUFFIX}-arm64-v8a.apk"
          cp "chromium/src/out/release/${VERSION}-arm64-v8a.aab" "artifacts/${BUILD_SUFFIX}-arm64-v8a.aab"
          sha256sum artifacts/* > "artifacts/${BUILD_SUFFIX}-SHA256SUMS.txt"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: helium-android-${{ env.BUILD_SUFFIX }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish release
        if: ${{ steps.signing.outputs.source == 'secrets' && (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)) }}
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', env.VERSION) }}
          name: Helium Android ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            artifacts/*
